# Release: multi-platform builds, GitHub Release + SHA256 checksums, and npm platform packages.
#
# Required repository secrets:
#   NPM_TOKEN — npm automation token with publish access
#
# Trigger: push a tag v* (e.g. v0.5.0). package.json version must match the tag without the leading v.
#
# npm publish layout is materialized in CI from packaging/npm/ (tracked) into gitignored npm/.

name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    name: Pre-release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome lint & format check
        run: bunx @biomejs/biome check .

      - name: TypeScript type check
        run: bunx tsc --noEmit

      - name: Run tests
        run: bun test

  build:
    name: Build (${{ matrix.npm_platform }})
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            artifact: token-free-gateway-linux-x64
            npm_platform: linux-x64
          - target: bun-linux-arm64
            artifact: token-free-gateway-linux-arm64
            npm_platform: linux-arm64
          - target: bun-darwin-x64
            artifact: token-free-gateway-darwin-x64
            npm_platform: darwin-x64
          - target: bun-darwin-arm64
            artifact: token-free-gateway-darwin-arm64
            npm_platform: darwin-arm64
          - target: bun-windows-x64
            artifact: token-free-gateway-windows-x64
            npm_platform: win32-x64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          bun build index.ts \
            --compile \
            --external chromium-bidi \
            --external electron \
            --target=${{ matrix.target }} \
            --outfile=dist/${{ matrix.artifact }}

      - name: Stage binary for npm upload
        id: stage
        run: |
          set -euo pipefail
          if [[ -f "dist/${{ matrix.artifact }}.exe" ]]; then
            echo "path=dist/${{ matrix.artifact }}.exe" >> "$GITHUB_OUTPUT"
          else
            echo "path=dist/${{ matrix.artifact }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload raw binary for npm
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.npm_platform }}
          path: ${{ steps.stage.outputs.path }}
          if-no-files-found: error

      - name: Compress artifact (tar.gz)
        run: |
          cd dist
          if ls ${{ matrix.artifact }}.exe 1>/dev/null 2>&1; then
            tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}.exe
          else
            tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          fi

      - name: Upload tar.gz artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz
          retention-days: 5

  release:
    name: Publish (GitHub Release + npm)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Require NPM_TOKEN secret
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          : "${NPM_TOKEN:?Missing secret NPM_TOKEN}"

      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Extract release version from tag
        id: version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" != v* ]]; then
            echo "Tag must start with v, got: $TAG" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Verify package.json version matches tag
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          ACTUAL="$(node -p "require('./package.json').version")"
          if [[ "$ACTUAL" != "$EXPECTED_VERSION" ]]; then
            echo "package.json version ($ACTUAL) does not match tag ($EXPECTED_VERSION)." >&2
            echo "Bump version in package.json before tagging." >&2
            exit 1
          fi

      - name: Determine npm dist-tag
        id: npm_tag
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" == *-rc* || "$VERSION" == *-beta* || "$VERSION" == *-alpha* ]]; then
            echo "dist_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Download tar.gz artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: token-free-gateway-*
          merge-multiple: false

      - name: Download raw binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded
          pattern: binary-*
          merge-multiple: true

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum *.tar.gz > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Extract release notes from tag
        id: notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "## Token-Free Gateway $TAG" > notes.md
          echo "" >> notes.md
          echo "### Downloads" >> notes.md
          echo "" >> notes.md
          echo "| Platform | Architecture | File |" >> notes.md
          echo "|----------|-------------|------|" >> notes.md
          echo "| Linux | x64 | \`token-free-gateway-linux-x64.tar.gz\` |" >> notes.md
          echo "| Linux | arm64 | \`token-free-gateway-linux-arm64.tar.gz\` |" >> notes.md
          echo "| macOS | x64 (Intel) | \`token-free-gateway-darwin-x64.tar.gz\` |" >> notes.md
          echo "| macOS | arm64 (Apple Silicon) | \`token-free-gateway-darwin-arm64.tar.gz\` |" >> notes.md
          echo "| Windows | x64 | \`token-free-gateway-windows-x64.tar.gz\` |" >> notes.md
          echo "" >> notes.md
          echo "### Install via npm" >> notes.md
          echo "" >> notes.md
          echo '```bash' >> notes.md
          echo "npx token-free-gateway@${TAG#v} --help" >> notes.md
          echo '```' >> notes.md
          echo "" >> notes.md
          echo "### Usage (binary)" >> notes.md
          echo "" >> notes.md
          echo '```bash' >> notes.md
          echo "tar xzf token-free-gateway-<platform>.tar.gz" >> notes.md
          echo "./token-free-gateway --help" >> notes.md
          echo '```' >> notes.md
          echo "" >> notes.md
          echo "> \`playwright-core\` is bundled inside the binary — no extra runtime dependencies. Just install Chrome or Chromium." >> notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          body_path: notes.md
          files: |
            release/*.tar.gz
            release/checksums-sha256.txt
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

      - name: Materialize npm/ from packaging/npm
        run: |
          set -euo pipefail
          rm -rf npm
          cp -R packaging/npm npm

      - name: Copy binaries into npm platform packages
        run: |
          set -euo pipefail
          copy_one() {
            local npm_platform="$1"
            local artifact_name="$2"
            local src_suffix="$3"
            local dest_name="$4"
            local src="downloaded/${artifact_name}${src_suffix}"
            local dest_dir="npm/${npm_platform}/bin"
            if [[ ! -f "$src" ]]; then
              echo "Missing artifact: $src" >&2
              ls -la downloaded || true
              exit 1
            fi
            mkdir -p "$dest_dir"
            cp -f "$src" "${dest_dir}/${dest_name}"
            chmod +x "${dest_dir}/${dest_name}" 2>/dev/null || true
          }
          copy_one darwin-arm64 token-free-gateway-darwin-arm64 "" token-free-gateway
          copy_one darwin-x64  token-free-gateway-darwin-x64  "" token-free-gateway
          copy_one linux-x64   token-free-gateway-linux-x64   "" token-free-gateway
          copy_one linux-arm64 token-free-gateway-linux-arm64 "" token-free-gateway
          copy_one win32-x64   token-free-gateway-windows-x64 .exe token-free-gateway.exe

      - name: Apply version to npm package.json files
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          for dir in npm/darwin-arm64 npm/darwin-x64 npm/linux-x64 npm/linux-arm64 npm/win32-x64 npm/token-free-gateway; do
            npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version --prefix "$dir"
          done

      - name: Sync optionalDependencies in meta package
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");
          const v = process.env.RELEASE_VERSION;
          if (!v) throw new Error("RELEASE_VERSION is unset");
          const p = "npm/token-free-gateway/package.json";
          const j = JSON.parse(fs.readFileSync(p, "utf8"));
          const opt = j.optionalDependencies;
          if (opt) {
            for (const k of Object.keys(opt)) opt[k] = v;
          }
          fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
          NODE

      - name: Copy README into every npm package
        run: |
          set -euo pipefail
          for dir in npm/darwin-arm64 npm/darwin-x64 npm/linux-x64 npm/linux-arm64 npm/win32-x64 npm/token-free-gateway; do
            cp README.md "${dir}/README.md"
          done

      - name: Publish npm platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for dir in npm/darwin-arm64 npm/darwin-x64 npm/linux-x64 npm/linux-arm64 npm/win32-x64; do
            (cd "$dir" && npm publish --access public --tag ${{ steps.npm_tag.outputs.dist_tag }})
          done

      - name: Publish npm meta package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          cd npm/token-free-gateway && npm publish --access public --tag ${{ steps.npm_tag.outputs.dist_tag }}
