name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Run checks before building release artifacts
  check:
    name: Pre-release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome lint & format check
        run: bunx @biomejs/biome check .

      - name: TypeScript type check
        run: bunx tsc --noEmit

      - name: Run tests
        run: bun test

  build:
    name: Build ${{ matrix.target }}
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            artifact: token-free-gateway-linux-x64
          - target: bun-linux-arm64
            artifact: token-free-gateway-linux-arm64
          - target: bun-darwin-x64
            artifact: token-free-gateway-darwin-x64
          - target: bun-darwin-arm64
            artifact: token-free-gateway-darwin-arm64
          - target: bun-windows-x64
            artifact: token-free-gateway-windows-x64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          bun build index.ts \
            --compile \
            --external playwright-core \
            --target=${{ matrix.target }} \
            --outfile=dist/${{ matrix.artifact }}

      - name: Compress artifact (tar.gz)
        run: |
          cd dist
          if ls ${{ matrix.artifact }}.exe 1>/dev/null 2>&1; then
            tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}.exe
          else
            tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz
          retention-days: 5

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum *.tar.gz > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Extract release notes from tag
        id: notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "## Token-Free Gateway $TAG" > notes.md
          echo "" >> notes.md
          echo "### Downloads" >> notes.md
          echo "" >> notes.md
          echo "| Platform | Architecture | File |" >> notes.md
          echo "|----------|-------------|------|" >> notes.md
          echo "| Linux | x64 | \`token-free-gateway-linux-x64.tar.gz\` |" >> notes.md
          echo "| Linux | arm64 | \`token-free-gateway-linux-arm64.tar.gz\` |" >> notes.md
          echo "| macOS | x64 (Intel) | \`token-free-gateway-darwin-x64.tar.gz\` |" >> notes.md
          echo "| macOS | arm64 (Apple Silicon) | \`token-free-gateway-darwin-arm64.tar.gz\` |" >> notes.md
          echo "| Windows | x64 | \`token-free-gateway-windows-x64.tar.gz\` |" >> notes.md
          echo "" >> notes.md
          echo "### Usage" >> notes.md
          echo "" >> notes.md
          echo '```bash' >> notes.md
          echo "tar xzf token-free-gateway-<platform>.tar.gz" >> notes.md
          echo "./token-free-gateway --help" >> notes.md
          echo '```' >> notes.md
          echo "" >> notes.md
          echo "> **Note:** \`playwright-core\` is required at runtime for browser-based providers. Install it via \`npm i -g playwright-core\` or keep \`node_modules\` alongside the binary." >> notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          body_path: notes.md
          files: |
            release/*.tar.gz
            release/checksums-sha256.txt
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
